   <script>
      var SPREADSHEET_ID = "1n5PbokNPI5bhdSI-QaX89o5U8ILy5_2fRUa2TWYOcaU"; 
      var TAB_NAME = "Sheet1";
      
      
      $(document).ready(function () {
       $.getJSON("https://opensheet.elk.sh/" + SPREADSHEET_ID + "/" + TAB_NAME, function (data) {
        
         console.log(data);
        
          data.forEach(function (entry, index) {
          
           console.log(entry);
          
                  $(`<section>
                      <span class="date-text">` + (entry.Date || "") + `</span>
                      <a href="` + entry.Link + `" target="_blank" class="title-link">
                      <h3 class="title-text">` + entry.Title + `</h3>
                      </a>
                      <p class="hover-text">` + entry.Hover + `</p>
                  </section>`)
                  .appendTo(".links");
         });
       }); 
      });
      </script>
